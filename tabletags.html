<!DOCTYPE html>
<html>
<head>
        <title>Table tags</title>
</head>
<body>
    <table border="2">
        <caption>Student information</caption>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Email</th>
            <th rowspan="4"> this cell has 2 row sapn</th>
        </tr>
        <tr>
            <td>John</td>
            <td>30</td>
            <td>john@email.com</td>
        </tr>
        <tr>
            <td>jane</td>
            <td>25</td>
            <td>jane@email.com</td>
        </tr>
        <tr>
            <td colspan="3"> this cell has 3 coll sapn </td>
        </tr>
    </table>
</body>
</html>

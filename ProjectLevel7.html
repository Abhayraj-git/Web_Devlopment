<!DOCTYPE html>
<html>
<head>
    <style>
        .progress-container
        {
            width: 80%;
            height: 20px;
            background-color: rgb(238, 238, 178);
            border: 2px solid;
            border-radius: 25px;
            position: relative;
            left: 5%;
        }
        .progress-bar
        {
            background-color: pink;
            height: 100%;
            width: 50%;
            border-radius: 25px;
            animation: Animation 2s ;
        }
        @keyframes Animation {
            0%{width: 0%;}
            90%{width: 70%;}
            0%{width: 50%;}
            100%{width: 100%;}
        }
    </style>
    <title>Animation,Transition And Transform</title>
</head>
<body>
    <div class="progress-container">
        <div class="progress-bar">

        </div>
    </div>
</body>
</html>

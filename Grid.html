<!DOCTYPE html>
<html>
<head>
    <style>
        .container
        {
            height: 100px;
            width: 100px;
            background-color: violet;
            border: 2px solid black;
            display: grid;
            grid-template-columns: 50px 50px;
            grid-template-rows: 50px 50px;
        }
        .box
        {
            border: 2px solid black;
            
        }
        #box1
        {
            background-color: purple;
            grid-row: 1/2;
            grid-column: 2/2;
        }
        #box2
        {
            background-color: yellow;
            grid-row: 1/2;
            grid-column: 1/2;
            
        }
        #box3
        {
            background-color: red;
            grid-row: 2/2;
            grid-column: 2/2;
            
        }
        #box4
        {
            background-color: brown;
            grid-row: 2/2;
            grid-column: 1/2;
        }
    </style>
    <title>Grid Box</title>
</head>
<body>
    <h1 style="text-align: center;"> FlexBox Direction</h1>
    <div class="container">
        <div id="box1" class="box">Item 1</div>
        <div id="box2" class="box">Item 2</div>
        <div id="box3" class="box">Item 3</div>
        <div id="box4" class="box">Item 4</div>
           
    </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <style>
        .raj
        {
            border: 2px solid;
            height: 212px;
            width: 600px;
        }
        .x
        {
            height: 200px;
            width: 200px;
            margin: 5px 5px 5px 5px;
        }
        #first
        {
            background-color: red;
            float: left;
        }
        #second
        {
            background-color: blue;
            float: right;
        }
    </style>
    <title>Float Property</title>
</head>
<body>
    <div class="raj">
    <div id="first" class="x">
        Box 1
    </div>
    <div id="second" class="x">
        Box 2
    </div>
    </div>
</body>
</html>

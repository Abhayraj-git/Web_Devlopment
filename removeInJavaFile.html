<!DOCTYPE html>
<html>
<head>
    <title>Removing</title>
</head>
<body>
<p id="removeMe">This message will be removed.</p>
<button onclick="removeNow()">Remove</button>
</body>

<script>
function removeNow() {
    var parent = document.body;
    var child = document.getElementById("removeMe");

    parent.remove(child);
}
</script>

</html>

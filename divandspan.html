<!DOCTYPE html>
<html>
<head>
    <title>Div tags and span tags</title>
</head>
<body>
    <div>
        <p> This is a paragraph</p>
        <big> This is big</big>
    </div>
    <div>
        <a href="#dummy">Dummy</a>
    </div>
    <span> 
        <a href="#dummy">dummy</a>
        <big>This is big</big>
    </span>
</body>
</html>

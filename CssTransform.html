<!DOCTYPE html>
<html>
<head>
    <style>
        .box
        {
            height: 100px;
            width: 100px;
            border: 2px solid;
            background-color: pink;
            position: relative;
            top: 50px;
            left: 50px;

            transition: all 0.2s ease-in;
        }
        .box:hover
        {
            transform: rotatey(270deg);
        }
    </style>
    <title>CSS Transform</title>
</head>
<body>
    <div class="box">
        Box !
    </div>
</body>
</html>
